<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>職業圖鑑 — 火炎之紋章：翠星之影</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  color: #e8e8f0;
  font-family: 'Segoe UI', sans-serif;
  min-height: 100vh;
}
header {
  background: linear-gradient(135deg, #1a1a3a 0%, #0a0a2a 100%);
  border-bottom: 2px solid #4a4a8a;
  padding: 24px;
  text-align: center;
}
header h1 {
  font-size: 28px;
  color: #aac;
  letter-spacing: 2px;
}
header p { color: #88a; margin-top: 6px; font-size: 14px; }
header a { color: #8af; text-decoration: none; }
header a:hover { text-decoration: underline; }

.subtitle { text-align:center; color:#888; font-size:13px; margin: 16px 0 24px; }

.table-container { overflow-x: auto; max-width: 1200px; margin: 0 auto; padding: 0 16px; }
table { width: 100%; border-collapse: collapse; background: #16213e; border: 2px solid #334; border-radius: 8px; overflow: hidden; min-width: 620px; }
th, td { padding: 10px; text-align: left; border-bottom: 1px solid #334; font-size: 15px; }
th { background: #111827; color: #e8d080; font-weight: bold; white-space: nowrap; position: sticky; top: 0; font-size: 16px; }
tr:hover { background: #1e293b; }
tr:last-child td { border-bottom: none; }

.sprite-col { min-width: 44px; text-align: center; }
.sprite-col canvas { display: inline-block; vertical-align: middle; }

.class-name { color: #e8d080; font-size: 18px; font-weight: bold; }
.class-id { color: #666; font-size: 11px; }

.tags { display: inline-flex; gap: 4px; flex-wrap: wrap; }
.tag { background: #334; color: #aaa; padding: 1px 5px; border-radius: 4px; font-size: 12px; }

.weapons { color: #8ab; font-size: 16px; }
.mov { color: #ccc; font-weight: bold; font-size: 16px; }

.stats { font-size: 13px; color: #aaa; white-space: nowrap; }
.stats div { display: inline-block; width: 27px; text-align: right; margin-right: 10px; }
.stats .lbl { color: #666; width: auto; margin-right: 2px; }

.promo { font-size: 13px; color: #ffa500; }
.promo-list { color: #8ab; }

@media (max-width: 700px) {
  h1 { font-size: 18px; }
  .subtitle { font-size: 11px; margin-bottom: 16px; }
  .table-container { padding: 0; max-width: 100vw; }
  table { min-width: 400px; font-size: 12px; }
  th, td { padding: 5px 4px 5px 4px; font-size: 11px; }
  .sprite-col { width: 64px; }
  .sprite-col canvas { max-width: 40px; max-height: 40px; }
  .class-name { font-size: 11px; }
  .stats { font-size: 9px; display: flex; flex-direction: column; white-space: normal; }
  .stats div { width: auto !important; text-align: left !important; display: block !important; }
  .tags { display: flex; flex-direction: column; gap: 0; align-items: flex-start; max-width: 60px; }
  .tag { font-size: 9px; margin-bottom: 1px; }
  .weapons { display: flex; flex-direction: column; font-size: 13px; }
  .mov { font-size: 13px; }
  .mov span { display: none; }
  .promo, .promo-list { font-size: 9px; display: flex; flex-direction: column; }
}

</style>
</head>
<body>
<header>
  <h1>⚔️ 職業圖鑑</h1>
  <p>翠星之影 — 全職業一覽 | <a href="../">← 返回遊戲</a></p>
</header>

<p class="subtitle">所有職業的屬性、武器適性與轉職路線</p>

<div class="table-container">
  <table>
    <thead>
      <tr>
        <th class="sprite-col">職業</th>
        <th>武器</th>
        <th>MOV</th>
        <th>類型</th>
        <th>加成</th>
        <th>轉職</th>
      </tr>
    </thead>
    <tbody id="class-list"></tbody>
  </table>
</div>

<script src="../js/data/items.js"></script>
<script src="../js/data/classes.js"></script>
<script src="../js/sprites.js"></script>
<script>
const canvas = document.createElement('canvas');
canvas.width = 32; canvas.height = 32;
const ctx = canvas.getContext('2d');
Sprites._frameCounter = 0;

function getStatAbbr(stat) {
  const map = { str:'力', mag:'魔', skl:'技', spd:'速', lck:'運', def:'防', res:'抗' };
  return map[stat] || stat;
}

function renderClasses() {
  const tbody = document.getElementById('class-list');
  const entries = Object.entries(CLASSES);
  
  entries.forEach(([id, cls]) => {
    const tr = document.createElement('tr');
    
    // Sprite cell
    const spriteTd = document.createElement('td');
    spriteTd.className = 'sprite-col';
    const spriteCvs = document.createElement('canvas');
    spriteCvs.width = 32; spriteCvs.height = 32;
    const sctx = spriteCvs.getContext('2d');
    
    const mockUnit = { classId: id, faction: 'player', portrait: null };
    sctx.save();
    sctx.translate(0, -2);
    Sprites._drawProceduralUnit(sctx, mockUnit, 0, 0, false, 1, 'player');
    sctx.restore();
    
    const nameDiv = document.createElement('div');
    nameDiv.className = 'class-name';
    nameDiv.textContent = cls.name;
    const idDiv = document.createElement('div');
    idDiv.className = 'class-id';
    idDiv.textContent = id;
    
    spriteTd.appendChild(spriteCvs);
    spriteTd.appendChild(nameDiv);
    spriteTd.appendChild(idDiv);
    tr.appendChild(spriteTd);
    
    // Weapons
    const weaponTd = document.createElement('td');
    weaponTd.className = 'weapons';
    const weaponIcons = { sword:'🗡️', lance:'🔱', axe:'🪓', bow:'🏹', 
                         fire:'🔥', thunder:'⚡', wind:'🌪️', dark:'🌑', staff:'🪄' };
    weaponTd.innerHTML = cls.weapons.map(w => `<span>${weaponIcons[w] || w} ${w}</span>`).join('<br>');
    tr.appendChild(weaponTd);
    
    // Movement
    const movTd = document.createElement('td');
    movTd.className = 'mov';
    movTd.innerHTML = `<span>🏃</span> ${cls.mov}`;
    tr.appendChild(movTd);
    
    // Tags
    const tagTd = document.createElement('td');
    const tagMap = { mounted:'🏇 騎乘', flying:'🦅 飛行', armored:'🛡️ 重甲', cavalry:'🐴 騎兵' };
    tagTd.innerHTML = (cls.tags || []).map(t => `<span class="tag">${tagMap[t] || t}</span>`).join(' ');
    if (!cls.tags || cls.tags.length === 0) tagTd.innerHTML = '<span class="tag">-</span>';
    tr.appendChild(tagTd);
    
    // Bonus stats
    const bonusTd = document.createElement('td');
    bonusTd.className = 'stats';
    if (cls.bonus) {
      bonusTd.innerHTML = Object.entries(cls.bonus)
        .filter(([k,v]) => v > 0)
        .map(([k,v]) => `<div><span class="lbl">${getStatAbbr(k)}</span>+${v}</div>`)
        .join('');
    } else {
      bonusTd.innerHTML = '<div>-</div>';
    }
    tr.appendChild(bonusTd);
    
    // Promotions
    const promoTd = document.createElement('td');
    promoTd.className = 'promo';
    if (cls.promo && cls.promo.length > 0) {
      const names = cls.promo.map(p => CLASSES[p.to]?.name || p.to).filter(n => n);
      promoTd.innerHTML = '<span class="promo-list">' + names.join('<br>→ ') + '</span>';
    } else if (cls.promoted) {
      promoTd.innerHTML = '<span class="promo-list">（上位職）</span>';
    } else {
      promoTd.innerHTML = '<span class="promo-list">-</span>';
    }
    tr.appendChild(promoTd);
    
    tbody.appendChild(tr);
  });
}

// Patch Sprites to use faction-based drawing
const origDrawUnit = Sprites.drawUnit;
Sprites.drawUnit = function(ctx, unit, x, y, grayed, sc, faction) {
  faction = faction || 'player';
  this._drawProceduralUnit(ctx, unit, x, y, grayed, sc, faction);
};

renderClasses();
</script>
</body>
</html>
