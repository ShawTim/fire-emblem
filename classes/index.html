<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>職業圖鑑 — 火炎之紋章：翠星之影</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a1a; color:#e8e8f0; font-family:'Segoe UI',sans-serif; min-height:100vh; }

header {
  background: linear-gradient(135deg, #1a1a3a 0%, #0a0a2a 100%);
  border-bottom: 2px solid #4a4a8a;
  padding: 24px;
  text-align: center;
}
header h1 {
  font-size: 28px;
  color: #aac;
  letter-spacing: 2px;
}
header p { color: #88a; margin-top: 6px; font-size: 14px; }
header a { color: #8af; text-decoration: none; }
header a:hover { text-decoration: underline; }

.subtitle { text-align:center; color:#888; font-size:13px; margin: 16px 0 24px; }

.table-container { overflow-x: auto; max-width: 1200px; margin: 0 auto; }
table { width: 100%; border-collapse: collapse; background: #16213e; border: 2px solid #334; border-radius: 8px; overflow: hidden; min-width: 620px; }
th, td { padding: 10px; text-align: left; border-bottom: 1px solid #334; font-size: 15px; }
th { background: #111827; color: #e8d080; font-weight: bold; white-space: nowrap; position: sticky; top: 0; font-size: 16px; }
tr:hover { background: #1e293b; }
tr:last-child td { border-bottom: none; }

.sprite-col { min-width: 44px; text-align: center; }
.sprite-col canvas { display: inline-block; vertical-align: middle; }

.class-name { color: #e8d080; font-size: 18px; font-weight: bold; }
.class-id { color: #666; font-size: 11px; }

.tags { display: inline-flex; gap: 4px; flex-wrap: wrap; }
.tag { background: #334; color: #aaa; padding: 1px 5px; border-radius: 4px; font-size: 12px; }

.weapons { color: #8ab; font-size: 16px; }
.mov { color: #ccc; font-weight: bold; font-size: 16px; }

.stats { font-size: 13px; color: #aaa; white-space: nowrap; }
.stats div { display: inline-block; width: 27px; text-align: right; margin-right: 10px; }
.stats .lbl { color: #666; width: auto; margin-right: 2px; }

.promo { font-size: 13px; color: #ffa500; }
.promo-list { color: #8ab; }

@media (max-width: 700px) {
  h1 { font-size: 18px; }
  .subtitle { font-size: 11px; margin-bottom: 16px; }
  .table-container { padding: 0; max-width: 100vw; }
  table { min-width: 400px; font-size: 12px; }
  th, td { padding: 5px 4px 5px 4px; font-size: 11px; }
  .sprite-col { width: 64px; }
  .sprite-col canvas { max-width: 40px; max-height: 40px; }
  .class-name { font-size: 11px; }
  .stats { font-size: 9px; display: flex; flex-direction: column; white-space: normal; }
  .stats div { width: auto !important; text-align: left !important; display: block !important; }
  .tags { display: flex; flex-direction: column; gap: 0; align-items: flex-start; max-width: 60px; }
  .tag { font-size: 9px; margin-bottom: 1px; }
  .weapons { display: flex; flex-direction: column; font-size: 13px; }
  .mov { font-size: 13px; }
  .mov span { display: none; }
  .promo, .promo-list { font-size: 9px; display: flex; flex-direction: column; }
}

</style>
</head>
<body>
<header>
  <h1>⚔️ 職業圖鑑</h1>
  <p>翠星之影 — 全職業一覽 | <a href="../">← 返回遊戲</a></p>
</header>

<p class="subtitle">所有職業的屬性、武器適性與轉職路線</p>

<div class="table-container">
  <table>
    <thead>
      <tr>
        <th class="sprite-col">職業</th>
        <th>武器</th>
        <th>MOV</th>
        <th>類型</th>
        <th>加成</th>
        <th>轉職</th>
      </tr>
    </thead>
    <tbody id="class-list"></tbody>
  </table>
</div>

<script src="../js/data/items.js"></script>
<script src="../js/data/classes.js"></script>
<script src="../js/data/chapters.js"></script>
<script src="../js/sprites.js"></script>
<script>
// Minimal GameMap stub for sprites
const GameMap = { tileSize:32, scale:2, width:20, height:15, terrain:[], getTerrain:()=>'plain', screenToTile:()=>({x:0,y:0}), camX:0, camY:0 };

const WEAPON_NAMES = { sword:'劍', lance:'槍', axe:'斧', bow:'弓', staff:'杖', fire:'火', thunder:'雷', wind:'風', dark:'暗' };
const WEAPON_EMOJI = { sword: '🗡️', lance: '🔱', axe: '🪓', bow: '🏹', staff: '🪄', fire: '🔥', thunder: '⚡', wind: '💨', dark: '🌑' };
const TAG_NAMES = { armored:'🛡️ 重裝', cavalry:'🐎 騎兵', flying:'🦅 飛行', mounted:'🐴 乘騎', undead:'💀 不死族' };

function renderList() {
  const tbody = document.getElementById('class-list');
  tbody.innerHTML = '';
  
  const classIds = Object.keys(CLASSES);
  
  classIds.forEach((classId, i) => {
    const cls = CLASSES[classId];
    // 原本分敵我，現在全部都出
    const tr = document.createElement('tr');
    
    // 1+2. Merge Sprite + Class Name (mobile: vertical stack)
    const tdSpriteName = document.createElement('td');
    tdSpriteName.className = 'sprite-col';
    const canvas = document.createElement('canvas');
    const scale = 2;
    canvas.width = 40 * scale;
    canvas.height = 40 * scale;
    canvas.style.width = (40 * scale) + 'px';
    canvas.style.height = (40 * scale) + 'px';
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    ctx.scale(scale, scale);
    
    const hairColors = ['#8040a0','#c04040','#4060c0','#40a040','#a08040','#d08050','#606060','#d0a030'];
    const unit = {
      classId: classId,
      faction: 'player',
      hp: 20, maxHp: 20,
      portrait: { hair: hairColors[i%8], skin:'#fdb', eyes:'#222' },
      isBoss: false,
    };
    Sprites.drawUnit(ctx, unit, 4, 4, false);
    ;
    tdSpriteName.appendChild(canvas);
    
    // Save for animation loop
    canvas.dataset.classId = classId;
    canvas.dataset.hairIndex = i % 8;
    
    const nameDiv = document.createElement('div'); nameDiv.className = 'class-name'; nameDiv.style.textAlign = 'center'; nameDiv.textContent = cls.name; tdSpriteName.appendChild(nameDiv); tr.appendChild(tdSpriteName); canvas.dataset.classId = classId; canvas.dataset.hairIndex = i % 8; // REMOVED:
    
    // 3. Weapons
    const tdWpn = document.createElement('td');
    const wpnList = (cls.weapons || []).map(w => `<span>${WEAPON_EMOJI[w] || w}</span>`).join('');
    tdWpn.innerHTML = `<div class="weapons">${wpnList}</div>`;
    tr.appendChild(tdWpn);
    
    // 4. MOV
    const tdMov = document.createElement('td');
    tdMov.innerHTML = `<div class="mov"><span>🏃 </span>${cls.mov || 5}</div>`;
    tr.appendChild(tdMov);
    
    // 5. Tags
    const tdTags = document.createElement('td');
    if (cls.tags && cls.tags.length > 0) {
      const tagsHtml = cls.tags.map(t => `<span class="tag">${TAG_NAMES[t] || t}</span>`).join('');
      tdTags.innerHTML = `<div class="tags">${tagsHtml}</div>`;
    } else {
      tdTags.innerHTML = ``;
    }
    tr.appendChild(tdTags);
    
    // 6. Bonus Stats
    const tdStats = document.createElement('td');
    const bns = cls.bonus || {};
    tdStats.innerHTML = `
      <div class="stats">
	<div><span class="lbl">HP</span><span>+${bns.hp ?? 0}</span></div>
        <div><span class="lbl">力</span><span>+${bns.str ?? 0}</span></div>
        <div><span class="lbl">魔</span><span>+${bns.mag ?? 0}</span></div>
        <div><span class="lbl">技</span><span>+${bns.skl ?? 0}</span></div>
        <div><span class="lbl">速</span><span>+${bns.spd ?? 0}</span></div>
        <div><span class="lbl">運</span><span>+${bns.lck ?? 0}</span></div>
        <div><span class="lbl">防</span><span>+${bns.def ?? 0}</span></div>
        <div><span class="lbl">魔防</span><span>+${bns.res ?? 0}</span></div>
      </div>
    `;
    tr.appendChild(tdStats);
    
    // 7. Promotion
    const tdPromo = document.createElement('td');
    if (cls.promo && cls.promo.length > 0) {
    const pNames = cls.promo.map(p => CLASSES[p.to] ? CLASSES[p.to].name : p.to).map(p => `<span class="promo-list">${p}</span>`).join("");
      tdPromo.innerHTML = `<div class="promo">可轉職: ${pNames}</div>`;
    } else if (cls.promoted) {
      tdPromo.innerHTML = `<div class="promo" style="color:#e8d080">⭐ 上級職</div>`;
      
    } else {
      tdPromo.innerHTML = `<div class="promo" style="color:#666">無法轉職</div>`;
    }
    tr.appendChild(tdPromo);
    
    tbody.appendChild(tr);
  });
}

window.onload = function() {
  setTimeout(renderList, 100);
};

// Animation loop
setInterval(function() {
  Sprites.tick(200);
  const canvases = document.querySelectorAll('.sprite-col canvas');
  const hairColors = ['#8040a0','#c04040','#4060c0','#40a040','#a08040','#d08050','#606060','#d0a030'];
  
  canvases.forEach(canvas => {
    const ctx = canvas.getContext('2d');
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.scale(2, 2);
    
    const classId = canvas.dataset.classId;
    const hIndex = parseInt(canvas.dataset.hairIndex) || 0;
    
    const unit = {
      classId: classId,
      faction: 'player',
      hp: 20, maxHp: 20,
      portrait: { hair: hairColors[hIndex], skin:'#fdb', eyes:'#222' },
      isBoss: false,
    };
    Sprites.drawUnit(ctx, unit, 4, 4, false);
  });
}, 200);
</script>
</body>
</html>
